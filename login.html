<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bible Reader Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .login-card{width:min(460px,100%);background:var(--surface);border:1px solid rgba(0,0,0,.08);border-radius:14px;box-shadow:0 10px 24px rgba(30,20,10,.1);padding:24px;}
    .login-title{margin:0 0 8px 0;font-size:1.4rem;}
    .login-sub{margin:0 0 18px 0;color:var(--muted);font-size:.95rem;}
    .login-row{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
    .login-status{min-height:20px;margin:4px 0 12px 0;font-size:.9rem;color:var(--muted);}    
    .login-status.error{color:#b34d4d;}
    .login-status.ok{color:#1f7a32;}
    .login-actions{display:flex;gap:10px;align-items:center;}
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-card" aria-labelledby="loginTitle">
      <h1 id="loginTitle" class="login-title">Login to Enable TTS</h1>
      <p class="login-sub">Bible reading is public, but text-to-speech requires authentication.</p>
      <form id="loginForm">
        <div class="login-row">
          <label for="username" class="setting-label">Username</label>
          <input id="username" class="setting-input" type="text" autocomplete="username" required>
        </div>
        <div class="login-row">
          <label for="password" class="setting-label">Password</label>
          <input id="password" class="setting-input" type="password" autocomplete="current-password" required>
        </div>
        <p id="loginStatus" class="login-status">Please sign in.</p>
        <div class="login-actions">
          <button type="submit" class="chapter-action">Login</button>
          <a id="backLink" href="index.html" class="chapter-action auth-login-link">Back</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const statusEl = document.getElementById('loginStatus');
    const backLink = document.getElementById('backLink');
    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/index.html';
    backLink.href = next;

    function setStatus(msg, cls){
      statusEl.textContent = msg;
      statusEl.className = 'login-status' + (cls ? ' ' + cls : '');
    }

    async function checkAlreadyLoggedIn(){
      try{
        const res = await fetch('/api/auth/status', { credentials: 'same-origin' });
        if(!res.ok) return;
        const data = await res.json();
        if(data.authenticated){
          window.location.href = next;
        }
      }catch(e){/* ignore */}
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if(!username || !password){
        setStatus('Username and password are required.', 'error');
        return;
      }
      setStatus('Signing in...');
      try{
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password })
        });
        if(!res.ok){
          const err = await res.json().catch(()=>({}));
          throw new Error(err.detail || 'Login failed');
        }
        setStatus('Login success. Redirecting...', 'ok');
        setTimeout(()=> { window.location.href = next; }, 250);
      }catch(err){
        setStatus(err.message || 'Login failed', 'error');
      }
    });

    checkAlreadyLoggedIn();
  </script>
</body>
</html>
